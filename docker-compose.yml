services:
  postgres:
    image: postgres:16
    container_name: framemind-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: framemind
      POSTGRES_PASSWORD: framemind
      POSTGRES_DB: framemind
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
volumes:
  postgres_data:
