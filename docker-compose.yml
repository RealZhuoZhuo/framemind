services:
  postgres:
    image: postgres:16
    container_name: framemind-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: framemind
      POSTGRES_PASSWORD: framemind
      POSTGRES_DB: framemind
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  minio:
    image: minio/minio:latest
    container_name: framemind-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: framemind
      MINIO_ROOT_PASSWORD: framemind
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
  minio-init:
    image: minio/mc:latest
    container_name: framemind-minio-init
    depends_on:
      - minio
    restart: "no"
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 framemind framemind; do
        sleep 1;
      done;
      mc mb -p local/framemind || true;
      mc anonymous set download local/framemind || true;
      "
volumes:
  postgres_data:
  minio_data:
